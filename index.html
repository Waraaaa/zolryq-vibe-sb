<!DOCTYPE html>
<html>
<head>
    <title>Zolryq Hub Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #1DB954; --text: #fff; --sub: #b3b3b3; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 100px; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; font-weight: bold; color: var(--sub); }
        .loop-btn { font-size: 18px; cursor: pointer; opacity: 0.3; }
        .loop-btn.active { opacity: 1; color: var(--accent); }

        /* Spotify-style List Item */
        .track-item { 
            display: flex; align-items: center; background: var(--card); 
            padding: 10px; border-radius: 8px; margin-bottom: 8px; gap: 12px;
        }
        .thumb { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #282828; }
        
        .track-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .track-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .card-title { font-size: 14px; font-weight: 600; outline: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Slider Styling */
        input[type=range] { width: 100%; height: 4px; accent-color: var(--accent); margin: 4px 0; cursor: pointer; }
        
        .track-controls { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .icon-btn { background: none; border: none; color: var(--sub); font-size: 16px; cursor: pointer; padding: 0; }
        .play-btn { color: white; font-size: 22px; }

        /* Modal */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: #282828; padding: 20px; border-radius: 12px; width: 80%; max-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal h4 { margin: 0 0 15px 0; }
        .modal p { font-size: 12px; color: var(--sub); margin: 5px 0; word-break: break-all; }

        /* Fixed Footer */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .add-btn { flex: 1; background: #fff; color: #000; border: none; padding: 12px; border-radius: 25px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h2 style="margin:0; font-size: 22px;">Zolryq Hub</h2>
        <div style="font-size: 20px;" onclick="location.reload()">🔄</div>
    </div>

    <div class="section-header"><span>MUSIC</span><span id="loopMusic" class="loop-btn" onclick="toggleLoop('music')">🔁</span></div>
    <div id="list-music"></div>

    <div class="section-header" style="margin-top:20px;"><span>SOUND EFFECTS</span><span id="loopSfx" class="loop-btn" onclick="toggleLoop('sfx')">🔁</span></div>
    <div id="list-sfx"></div>

    <!-- Info Modal -->
    <div id="infoModal" class="overlay" onclick="this.style.display='none'">
        <div class="modal" onclick="event.stopPropagation()">
            <h4>File Information</h4>
            <p id="info-name"></p>
            <p id="info-size"></p>
            <p id="info-type"></p>
            <button class="add-btn" style="width:100%; margin-top:15px; background:#444; color:#fff" onclick="document.getElementById('infoModal').style.display='none'">Close</button>
        </div>
    </div>

    <div class="footer">
        <button class="add-btn" onclick="openPicker('music')">+ Add Music</button>
        <button class="add-btn" onclick="openPicker('sfx')">+ Add SFX</button>
    </div>

    <input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="processFile(event)">

    <script>
        let db, currentType = 'music', loops = { music: false, sfx: false };

        const req = indexedDB.open("ZolryqSpotifyDB", 1);
        req.onupgradeneeded = e => {
            e.target.result.createObjectStore("media", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = e => { db = e.target.result; loadMedia(); };

        function openPicker(type) { currentType = type; document.getElementById('fileInput').click(); }

        function toggleLoop(type) {
            loops[type] = !loops[type];
            document.getElementById(`loop${type.charAt(0).toUpperCase()+type.slice(1)}`).classList.toggle('active', loops[type]);
        }

        function processFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const tx = db.transaction("media", "readwrite");
                tx.objectStore("media").add({
                    originalName: file.name,
                    displayName: file.name.split('.')[0],
                    fileSize: (file.size / 1024 / 1024).toFixed(2) + " MB",
                    fileType: file.type,
                    data: ev.target.result,
                    type: currentType,
                    image: "https://via.placeholder.com/150/282828/fff?text=?"
                });
                tx.oncomplete = loadMedia;
            };
            reader.readAsDataURL(file);
        }

        function loadMedia() {
            document.getElementById('list-music').innerHTML = '';
            document.getElementById('list-sfx').innerHTML = '';
            db.transaction("media").objectStore("media").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) { renderItem(cursor.value); cursor.continue(); }
            };
        }

        function renderItem(item) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.id = `item-${item.id}`;
            div.innerHTML = `
                <img class="thumb" src="${item.image}" onclick="setImg(${item.id})">
                <div class="track-content">
                    <div class="track-top">
                        <span class="card-title" contenteditable="true" onblur="updateName(${item.id}, this)">${item.displayName}</span>
                    </div>
                    <input type="range" id="range-${item.id}" value="0" step="0.1" oninput="doSeek(${item.id})">
                    <div class="track-controls">
                        <button class="icon-btn play-btn" id="play-${item.id}" onclick="pPlay(${item.id})">▶️</button>
                        <button class="icon-btn" onclick="showInfo(${item.id})">ℹ️</button>
                        <button class="icon-btn" onclick="delItem(${item.id})">🗑️</button>
                    </div>
                </div>
                <audio id="aud-${item.id}" src="${item.data}"></audio>
            `;
            document.getElementById(`list-${item.type}`).appendChild(div);
            
            const a = document.getElementById(`aud-${item.id}`);
            a.onloadedmetadata = () => { document.getElementById(`range-${item.id}`).max = a.duration; };
            a.ontimeupdate = () => { if(!document.getElementById(`range-${item.id}`).matches(':active')) document.getElementById(`range-${item.id}`).value = a.currentTime; };
            a.onended = () => { if(loops[item.type]) a.play(); else document.getElementById(`play-${item.id}`).innerText = "▶️"; };
        }

        function updateName(id, el) {
            const tx = db.transaction("media", "readwrite");
            const store = tx.objectStore("media");
            store.get(id).onsuccess = e => {
                let d = e.target.result; d.displayName = el.innerText; store.put(d);
            };
        }

        function delItem(id) {
            if(confirm("Delete this sound?")) {
                const aud = document.getElementById(`aud-${id}`);
                aud.pause();
                db.transaction("media", "readwrite").objectStore("media").delete(id).oncomplete = () => {
                    document.getElementById(`item-${id}`).remove();
                };
            }
        }

        function showInfo(id) {
            db.transaction("media").objectStore("media").get(id).onsuccess = e => {
                const d = e.target.result;
                document.getElementById('info-name').innerText = "Original: " + d.originalName;
                document.getElementById('info-size').innerText = "Size: " + d.fileSize;
                document.getElementById('info-type').innerText = "Type: " + d.fileType;
                document.getElementById('infoModal').style.display = 'flex';
            };
        }

        function pPlay(id) {
            const a = document.getElementById(`aud-${id}`), b = document.getElementById(`play-${id}`);
            if(a.paused) { a.play(); b.innerText = "⏸️"; } else { a.pause(); b.innerText = "▶️"; }
        }

        function doSeek(id) { document.getElementById(`aud-${id}`).currentTime = document.getElementById(`range-${id}`).value; }

        function setImg(id) {
            const url = prompt("Image URL:");
            if(!url) return;
            const tx = db.transaction("media", "readwrite");
            const st = tx.objectStore("media");
            st.get(id).onsuccess = e => { let d = e.target.result; d.image = url; st.put(d); loadMedia(); };
        }
    </script>
</body>
</html>
