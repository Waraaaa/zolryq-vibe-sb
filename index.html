<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Avatar Overlay</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        #avatar-box { width: 300px; height: 300px; margin: 20px auto; border: 2px solid #5865f2; }
        iframe { width: 100%; height: 100%; border: none; }
        .setup-input { padding: 10px; width: 80%; border-radius: 5px; }
        .btn { background: #5865f2; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAa</h1>
    <p>Paste your Fugi Link here:</p>
    <input type="text" id="fugiLink" class="setup-input" placeholder="https://reactive.fugi.tech/u/...">
    <br><br>
    <button class="btn" onclick="loadAvatar()">Load Avatar</button>

    <div id="avatar-box">
        <iframe id="avatarFrame" src=""></iframe>
    </div>

    <p style="font-size: 0.8em;">Open this in <b>Slide Over</b> so it floats over your game screen</p>

    <script>
        function loadAvatar() {
            const link = document.getElementById('fugiLink').value;
            document.getElementById('avatarFrame').src = link;
        }
    </script>
</body>
</html>
