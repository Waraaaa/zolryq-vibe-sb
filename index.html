<!DOCTYPE html>
<html>
<head>
    <title>Zolryq Media Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root { --bg: #000000; --card: #121212; --accent: #1db954; --text: #ffffff; --sub: #b3b3b3; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px; margin: 0; padding-bottom: 100px; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 10px 10px; font-size: 14px; letter-spacing: 1px; color: var(--sub); }
        .loop-btn { font-size: 18px; cursor: pointer; opacity: 0.3; transition: 0.2s; }
        .loop-btn.active { opacity: 1; color: var(--accent); }

        .grid { display: flex; flex-direction: column; gap: 8px; }
        
        /* Spotify-style Horizontal Card */
        .card { 
            display: flex; align-items: center; background: var(--card); 
            border-radius: 8px; padding: 8px; gap: 12px; height: 80px; 
            transition: background 0.2s;
        }
        .thumb { width: 64px; height: 64px; min-width: 64px; border-radius: 4px; object-fit: cover; background: #282828; }
        
        /* Right Side Content */
        .content-right { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        
        .card-title { 
            font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; outline: none;
        }
        .card-title:focus { color: var(--accent); }

        .slider-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        input[type=range] { flex-grow: 1; height: 4px; accent-color: var(--accent); cursor: pointer; }
        
        .btn-row { display: flex; gap: 12px; margin-top: 6px; align-items: center; }
        .btn { background: none; border: none; color: var(--sub); padding: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; }
        .btn:active { color: white; }
        .play-btn { color: white; font-size: 22px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .add-btn { flex: 1; background: #222; color: white; border: none; padding: 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <h2 style="text-align: left; margin: 15px 10px; font-size: 22px;">Media Library</h2>

    <div class="section-header"><span>MUSIC</span><span id="loopMusic" class="loop-btn" onclick="toggleLoop('music')">🔁</span></div>
    <div id="grid-music" class="grid"></div>

    <div class="section-header"><span>SOUND EFFECTS</span><span id="loopSfx" class="loop-btn" onclick="toggleLoop('sfx')">🔁</span></div>
    <div id="grid-sfx" class="grid"></div>

    <div class="footer">
        <button class="add-btn" onclick="openPicker('music')">+ Add Music</button>
        <button class="add-btn" onclick="openPicker('sfx')">+ Add SFX</button>
    </div>

    <input type="file" id="fileInput" accept=".mp3,audio/*" style="display:none" onchange="processFile(event)">

    <script>
        let db, currentType = 'music', loops = { music: false, sfx: false };

        const req = indexedDB.open("Zolryq_Spotify_DB", 1);
        req.onupgradeneeded = e => {
            e.target.result.createObjectStore("media", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = e => { db = e.target.result; loadMedia(); };

        function openPicker(type) { currentType = type; document.getElementById('fileInput').click(); }

        function processFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const tx = db.transaction("media", "readwrite");
                tx.objectStore("media").add({
                    displayName: file.name.split('.')[0],
                    data: ev.target.result,
                    type: currentType,
                    image: "" // Empty for now
                });
                tx.oncomplete = loadMedia;
            };
            reader.readAsDataURL(file);
        }

        function loadMedia() {
            document.getElementById('grid-music').innerHTML = '';
            document.getElementById('grid-sfx').innerHTML = '';
            db.transaction("media").objectStore("media").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) { renderItem(cursor.value); cursor.continue(); }
            };
        }

        function renderItem(item) {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = `card-${item.id}`;
            const displayImg = item.image || "https://via.placeholder.com/64/282828/555?text=♪";
            
            div.innerHTML = `
                <img class="thumb" src="${displayImg}" onclick="setImg(${item.id})">
                <div class="content-right">
                    <span class="card-title" contenteditable="true" onblur="updateName(${item.id}, this)">${item.displayName}</span>
                    <div class="slider-row">
                        <input type="range" id="range-${item.id}" value="0" step="0.1" oninput="doSeek(${item.id})">
                    </div>
                    <div class="btn-row">
                        <button class="btn play-btn" id="play-${item.id}" onclick="pPlay(${item.id})">▶</button>
                        <button class="btn" onclick="delItem(${item.id})">🗑️</button>
                    </div>
                </div>
                <audio id="aud-${item.id}" src="${item.data}"></audio>
            `;
            document.getElementById(`grid-${item.type}`).appendChild(div);
            
            const a = document.getElementById(`aud-${item.id}`);
            a.onloadedmetadata = () => { document.getElementById(`range-${item.id}`).max = a.duration; };
            a.ontimeupdate = () => { 
                const s = document.getElementById(`range-${item.id}`);
                if(!s.matches(':active')) s.value = a.currentTime; 
            };
            a.onended = () => { if(loops[item.type]) a.play(); };
        }

        function updateName(id, el) {
            const tx = db.transaction("media", "readwrite");
            const store = tx.objectStore("media");
            store.get(id).onsuccess = e => {
                let d = e.target.result; d.displayName = el.innerText; store.put(d);
            };
        }

        function delItem(id) { 
            if(confirm("Delete this?")) { 
                const aud = document.getElementById(`aud-${id}`);
                if(aud) { aud.pause(); aud.src = ""; }
                db.transaction("media", "readwrite").objectStore("media").delete(id).oncomplete = () => {
                    document.getElementById(`card-${id}`).remove();
                };
            } 
        }

        function pPlay(id) {
            const a = document.getElementById(`aud-${id}`), b = document.getElementById(`play-${id}`);
            if(a.paused) { 
                // Pause all other audios first (Optional Spotify behavior)
                document.querySelectorAll('audio').forEach(el => {
                    if(el.id !== `aud-${id}`) {
                        el.pause();
                        const otherBtn = document.getElementById(`play-${el.id.split('-')[1]}`);
                        if(otherBtn) otherBtn.innerText = "▶";
                    }
                });
                a.play(); b.innerText = "⏸"; 
            } else { 
                a.pause(); b.innerText = "▶"; 
            }
        }

        function doSeek(id) { document.getElementById(`aud-${id}`).currentTime = document.getElementById(`range-${id}`).value; }

        function toggleLoop(type) {
            loops[type] = !loops[type];
            document.getElementById(`loop${type.charAt(0).toUpperCase()+type.slice(1)}`).classList.toggle('active', loops[type]);
        }

        function setImg(id) {
            const url = prompt("Image URL:");
            if(!url) return;
            const tx = db.transaction("media", "readwrite");
            const st = tx.objectStore("media");
            st.get(id).onsuccess = e => { let d = e.target.result; d.image = url; st.put(d); loadMedia(); };
        }
    </script>
</body>
</html>
